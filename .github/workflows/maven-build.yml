name: Java Maven CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build, Test, Package WAR
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Cache Maven local repository
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build (compile)
        run: mvn -B clean compile

      - name: Run tests
        run: mvn -B test

      - name: Package WAR
        run: mvn -B package

      - name: Verify WAR artifact exists
        run: |
          ls -l target
          WARFILE=$(ls target/*.war 2>/dev/null || true)
          if [ -z "$WARFILE" ]; then
            echo "WAR not found"
            exit 1
          fi
          echo "WAR found: $WARFILE"

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: war-artifact
          path: target/*.war
