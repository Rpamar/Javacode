name: Java Maven CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build, Test, Package WAR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Cache Maven local repository
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build, test, package, and analyze with SonarQube
        run: >
          mvn -B clean verify sonar:sonar
          -Dsonar.projectKey=Rpamar_Javacode
          -Dsonar.projectName="Javacode"
          -Dsonar.host.url="https://sonarcloud.io"
          -Dsonar.token="0c27630e225c11a52c9ccb5b030b4c3d6fa12379"

      - name: Verify WAR artifact exists
        run: |
          ls -l target
          WARFILE=$(ls target/*.war 2>/dev/null || true)
          if [ -z "$WARFILE" ]; then
            echo "WAR not found"
            exit 1
          fi
          echo "WAR found: $WARFILE"

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: war-artifact
          path: target/*.war

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Set WAR file path
        run: |
          ORIG_WAR=$(ls target/*.war | grep -v .original)
          ROOT_WAR=target/ROOT.war
          cp "$ORIG_WAR" "$ROOT_WAR"
          echo "WAR_FILE=$ROOT_WAR" >> $GITHUB_ENV

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: hotelbookings-ws
          resource-group-name: hotelbookings-rg
          package: ${{ env.WAR_FILE }}
